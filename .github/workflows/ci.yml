name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    php-tests:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                php-version: [7.4, 8.0, 8.1, 8.2]
                wordpress-version: [6.3, 6.4]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip

            - name: Setup WordPress test environment
              uses: WordPress/wordpress-develop-tests@v2
              with:
                  wp-version: ${{ matrix.wordpress-version }}

            - name: Install dependencies
              run: composer install --no-dev --optimize-autoloader

            - name: Run PHPCS
              run: |
                  composer global require wp-coding-standards/wpcs
                  ./vendor/bin/phpcs --standard=phpcs.xml

            - name: Run PHPUnit tests
              run: ./vendor/bin/phpunit

    js-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint:js

            - name: Build assets
              run: npm run build

    e2e-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps

            - name: Run Playwright tests
              run: npm run e2e

    package:
        runs-on: ubuntu-latest
        needs: [php-tests, js-tests, e2e-tests]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Package plugin
              run: npm run package

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wp-telegram-post-notifier
                  path: dist/wp-telegram-post-notifier.zip
